<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassTube Project Hub</title>
    <!-- Using Roboto to replicate YouTube's default UI font style -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top YouTube Navigation Bar */
        header {
            background-color: #212121;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            color: #ff0000;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
        }

        /* YouTube Classic Sidebar + Main Frame Layout */
        .app-layout {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 240px;
            background-color: #212121;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 0 24px;
            height: 40px;
            color: #f1f1f1;
            text-decoration: none;
            font-size: 14px;
            border-radius: 10px;
            margin: 0 12px;
        }

        .sidebar-item.active, .sidebar-item:hover {
            background-color: #3d3d3d;
        }

        .main-container {
            flex: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Upload Section Styled like a Creator Card */
        .upload-section {
            background: #212121;
            padding: 20px;
            border-radius: 12px;
        }

        .upload-section h2 {
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 500;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .form-group input {
            background-color: #121212;
            color: #fff;
            padding: 10px 16px;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3ea6ff;
        }

        .form-group button {
            background-color: #3ea6ff;
            color: #0f0f0f;
            border: none;
            padding: 10px 20px;
            border-radius: 18px; /* YouTube Pill Button shape */
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
        }

        .form-group button:hover {
            background-color: #65b8ff;
        }

        /* Video Feed Grid & Video Card Layouts */
        .video-feed {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .video-card {
            background: #212121;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .video-player-container {
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        .video-player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fallback-link-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #aaa;
            padding: 20px;
            text-align: center;
        }

        .fallback-link-box a {
            color: #3ea6ff;
            font-size: 16px;
            margin-top: 10px;
            text-decoration: none;
        }

        /* Meta Information Space */
        .video-info {
            padding: 20px;
            border-bottom: 1px solid #3d3d3d;
            position: relative;
        }

        .video-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
            line-height: 26px;
            padding-right: 160px;
        }

        /* YouTube Video Controls Rows */
        .video-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .uploader-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #535353;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }

        .uploader-details .name {
            font-weight: 500;
            font-size: 16px;
        }

        .uploader-details .sub-count {
            font-size: 12px;
            color: #aaa;
        }

        /* Interactive YouTube Pill Badges (Likes / Actions) */
        .interactive-pills {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .yt-pill-group {
            display: flex;
            background-color: #2f2f2f;
            border-radius: 18px;
            overflow: hidden;
        }

        .pill-btn {
            background: none;
            border: none;
            color: #fff;
            padding: 0 16px;
            height: 36px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .pill-btn:hover {
            background-color: #3d3d3d;
        }

        .pill-btn.active {
            background-color: #f1f1f1;
            color: #0f0f0f;
        }

        .pill-separator {
            width: 1px;
            background-color: #4d4d4d;
            height: 24px;
            align-self: center;
        }

        .btn-single-pill {
            background-color: #2f2f2f;
            border-radius: 18px;
        }

        .btn-delete-pill {
            color: #ff4d4d;
        }

        /* Inline Editing */
        .edit-form-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #3d3d3d;
        }

        .edit-form-box input {
            background: #121212;
            color: #fff;
            padding: 8px;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
        }

        /* Video Comment Sections */
        .comments-section {
            padding: 20px;
            background: #1a1a1a;
        }

        .comments-count {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .comment-input-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .comment-input-box input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #3d3d3d;
            color: #fff;
            padding: 8px 0;
            font-size: 14px;
        }

        .comment-input-box input:focus {
            outline: none;
            border-bottom: 2px solid #fff;
        }

        .comment-input-box .student-name { width: 140px; }
        .comment-input-box .comment-text { flex: 1; }

        .comment-input-box button {
            background-color: #3ea6ff;
            color: #0f0f0f;
            border: none;
            padding: 0 16px;
            height: 36px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 500;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            font-size: 14px;
        }

        .comment-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .comment-author {
            font-weight: 500;
            font-size: 13px;
        }

        .comment-content {
            color: #f1f1f1;
            line-height: 18px;
        }

        .no-videos {
            text-align: center;
            color: #aaa;
            margin-top: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <header>
        <a href="#" class="logo">🛑 <span>ClassTube</span></a>
    </header>

    <div class="app-layout">
        <!-- YouTube Left Sidebar simulation -->
        <aside class="sidebar">
            <a href="#" class="sidebar-item active">🏠 Home</a>
            <a href="#" class="sidebar-item">🔥 Trending</a>
            <a href="#" class="sidebar-item">📁 Projects</a>
            <a href="#" class="sidebar-item">📝 Library</a>
        </aside>

        <!-- Main Window Area -->
        <div class="main-container">
            <!-- Upload Section -->
            <section class="upload-section">
                <h2>Upload Your Video Project</h2>
                <div class="form-group">
                    <input type="text" id="studentName" placeholder="Your Name (e.g., Alex)" required>
                    <input type="text" id="videoTitle" placeholder="Project Title" required>
                    <input type="url" id="videoUrl" placeholder="Paste Video URL Link" required>
                    <button onclick="uploadVideo()">Publish</button>
                </div>
            </section>

            <!-- Video Feed Display Grid -->
            <main class="video-feed" id="videoFeed">
                <!-- Data injections populate here -->
            </main>
        </div>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('classProjects')) || [];
        let activeEditIndex = null; 

        // Safely extract names for creating avatar circles
        function getInitials(name) {
            return name ? name.trim().charAt(0) : '?';
        }

        function getEmbedSnippet(url) {
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            
            if (match && match[2].length == 11) {
                return `<iframe src="https://www.youtube.com/embed/${match[2]}" allowfullscreen></iframe>`;
            } else {
                return `
                    <div class="fallback-link-box">
                        <p>External Assignment Attachment:</p>
                        <a href="${url}" target="_blank" rel="noopener noreferrer">🔗 View External Student Submission Link</a>
                    </div>
                `;
            }
        }

        function renderFeed() {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '';

            if (projects.length === 0) {
                feed.innerHTML = '<p class="no-videos">No video projects posted yet. Submit yours above!</p>';
                return;
            }

            for (let i = projects.length - 1; i >= 0; i--) {
                const project = projects[i];
                
                // Gracefully upgrade old structured data sets to match new interactions architecture
                if (project.likes === undefined) project.likes = 0;
                if (project.dislikes === undefined) project.dislikes = 0;
                if (project.userAction === undefined) project.userAction = null; // can be 'liked' or 'disliked'

                const card = document.createElement('div');
                card.className = 'video-card';

                let commentsHTML = '';
                project.comments.forEach(c => {
                    commentsHTML += `
                        <div class="comment-item">
                            <div class="avatar" style="width:32px; height:32px; font-size:12px;">${escapeHTML(getInitials(c.author))}</div>
                            <div class="comment-body">
                                <span class="comment-author">${escapeHTML(c.author)}</span>
                                <span class="comment-content">${escapeHTML(c.text)}</span>
                            </div>
                        </div>
                    `;
                });

                let editFormHTML = '';
                if (activeEditIndex === i) {
                    editFormHTML = `
                        <div class="edit-form-box">
                            <input type="text" id="edit-title-${i}" value="${escapeHTML(project.title)}">
                            <input type="url" id="edit-url-${i}" value="${escapeHTML(project.url)}">
                            <div style="display:flex; gap:8px;">
                                <button class="pill-btn active" onclick="saveEdit(${i})">Save</button>
                                <button class="pill-btn" onclick="cancelEdit()">Cancel</button>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="video-player-container">
                        ${getEmbedSnippet(project.url)}
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${escapeHTML(project.title)}</h3>
                        
                        <div class="video-controls-row">
                            <div class="uploader-profile">
                                <div class="avatar">${escapeHTML(getInitials(project.student))}</div>
                                <div class="uploader-details">
                                    <div class="name">${escapeHTML(project.student)}</div>
                                    <div class="sub-count">Student Creator</div>
                                </div>
                            </div>
                            
                            <div class="interactive-pills">
                                <!-- Like / Dislike Container Group -->
                                <div class="yt-pill-group">
                                    <button class="pill-btn ${project.userAction === 'liked' ? 'active' : ''}" onclick="handleLike(${i})">
                                        👍 <span>${project.likes}</span>
                                    </button>
                                    <div class="pill-separator"></div>
                                    <button class="pill-btn ${project.userAction === 'disliked' ? 'active' : ''}" onclick="handleDislike(${i})">
                                        👎 <span>${project.dislikes}</span>
                                    </button>
                                </div>

                                <!-- Action Operations Container Group -->
                                <button class="pill-btn btn-single-pill" onclick="toggleEdit(${i})">✏️ Edit</button>
                                <button class="pill-btn btn-single-pill btn-delete-pill" onclick="deleteVideo(${i})">🗑️ Delete</button>
                            </div>
                        </div>

                        ${editFormHTML}
                    </div>
                    <div class="comments-section">
                        <div class="comments-count">${project.comments.length} Comments</div>
                        
                        <div class="comment-input-box">
                            <input type="text" class="student-name" id="name-${i}" placeholder="Your Name" required>
                            <input type="text" class="comment-text" id="text-${i}" placeholder="Add a public comment..." required>
                            <button onclick="addComment(${i})">Comment</button>
                        </div>

                        <div class="comments-list">
                            ${commentsHTML}
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            }
        }

        // Toggle Like Engine
        function handleLike(index) {
            let proj = projects[index];
            if (proj.userAction === 'liked') {
                proj.likes--;
                proj.userAction = null;
            } else {
                if (proj.userAction === 'disliked') {
                    proj.dislikes--;
                }
                proj.likes++;
                proj.userAction = 'liked';
            }
            updateStorage();
        }

        // Toggle Dislike Engine
        function handleDislike(index) {
            let proj = projects[index];
            if (proj.userAction === 'disliked') {
                proj.dislikes--;
                proj.userAction = null;
            } else {
                if (proj.userAction === 'liked') {
                    proj.likes--;
                }
                proj.dislikes++;
                proj.userAction = 'disliked';
            }
            updateStorage();
        }

        function uploadVideo() {
            const nameInput = document.getElementById('studentName');
            const titleInput = document.getElementById('videoTitle');
            const urlInput = document.getElementById('videoUrl');

            if (!nameInput.value || !titleInput.value || !urlInput.value) {
                alert('Please fill out all fields before submitting.');
                return;
            }

            const newProject = {
                student: nameInput.value,
                title: titleInput.value,
                url: urlInput.value,
                likes: 0,
                dislikes: 0,
                userAction: null,
                comments: []
            };

            projects.push(newProject);
            updateStorage();
            
            titleInput.value = '';
            urlInput.value = '';
        }

        function toggleEdit(index) {
            activeEditIndex = (activeEditIndex === index) ? null : index;
            renderFeed();
        }

        function cancelEdit() {
            activeEditIndex = null;
            renderFeed();
        }

        function saveEdit(index) {
            const updatedTitle = document.getElementById(`edit-title-${index}`).value;
            const updatedUrl = document.getElementById(`edit-url-${index}`).value;

            if (!updatedTitle || !updatedUrl) {
                alert('Fields cannot be empty.');
                return;
            }

            projects[index].title = updatedTitle;
            projects[index].url = updatedUrl;
            activeEditIndex = null;
            updateStorage();
        }

        function deleteVideo(index) {
            if (confirm(`Delete "${projects[index].title}"?`)) {
                projects.splice(index, 1);
                activeEditIndex = null;
                updateStorage();
            }
        }

        function addComment(index) {
            const authorInput = document.getElementById(`name-${index}`);
            const textInput = document.getElementById(`text-${index}`);

            if (!authorInput.value || !textInput.value) {
                alert('Please fill out fields to comment.');
                return;
            }

            projects[index].comments.push({
                author: authorInput.value,
                text: textInput.value
            });

            updateStorage();
        }

        function updateStorage() {
            localStorage.setItem('classProjects', JSON.stringify(projects));
            renderFeed();
        }

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        renderFeed();
    </script>
</body>
</html>
